<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Clipboard / report background -->
  <rect x="24" y="28" width="112" height="128" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Clipboard top clip -->
  <rect x="56" y="20" width="48" height="18" rx="6" fill="#E3F2FD" stroke="#BBDEFB" stroke-width="1.5"/>
  <rect x="72" y="16" width="16" height="10" rx="4" fill="#1565C0"/>
  <!-- Empty bar chart placeholder -->
  <!-- Bar slots (dashed outline = empty) -->
  <rect x="38" y="100" width="16" height="40" rx="3" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="60" y="84"  width="16" height="56" rx="3" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="82" y="68"  width="16" height="72" rx="3" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="104" y="52" width="16" height="88" rx="3" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- X axis -->
  <line x1="34" y1="142" x2="126" y2="142" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Empty text lines at top of report -->
  <rect x="38" y="44" width="72" height="6" rx="3" fill="#F3F4F6"/>
  <rect x="38" y="56" width="52" height="5" rx="2" fill="#F3F4F6"/>
  <!-- Question-mark / "add data" badge -->
  <circle cx="122" cy="128" r="16" fill="#1565C0"/>
  <text x="122" y="134" text-anchor="middle" font-size="16" font-family="Arial,sans-serif" font-weight="bold" fill="#FFFFFF">+</text>
  <!-- Decorative accents -->
  <circle cx="24"  cy="28"  r="4" fill="#E3F2FD" fill-opacity="0.90"/>
  <circle cx="138" cy="30"  r="3" fill="#FFD54F" fill-opacity="0.60"/>
  <circle cx="20"  cy="120" r="5" fill="#E8F5E9" fill-opacity="0.70"/>
</svg>
