<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Receipt paper body -->
  <rect x="36" y="20" width="88" height="108" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Receipt zigzag bottom (tear) -->
  <polyline points="36,128 42,136 48,128 54,136 60,128 66,136 72,128 78,136 84,128 90,136 96,128 102,136 108,128 114,136 120,128 124,128"
            stroke="#E5E7EB" stroke-width="1.5" fill="none"/>
  <!-- Receipt lines (empty placeholders) -->
  <rect x="48" y="38" width="64" height="7" rx="3" fill="#F3F4F6"/>
  <rect x="48" y="54" width="48" height="6" rx="3" fill="#F3F4F6"/>
  <rect x="48" y="68" width="56" height="6" rx="3" fill="#F3F4F6"/>
  <!-- Divider -->
  <line x1="44" y1="82" x2="116" y2="82" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="48" y="90" width="32" height="6" rx="3" fill="#F3F4F6"/>
  <rect x="88" y="90" width="24" height="6" rx="3" fill="#E3F2FD"/>
  <!-- Plus badge - add first transaction -->
  <circle cx="118" cy="130" r="18" fill="#1565C0"/>
  <rect x="111" y="128" width="14" height="4" rx="2" fill="#FFFFFF"/>
  <rect x="116" y="123" width="4" height="14" rx="2" fill="#FFFFFF"/>
  <!-- Decorative dots -->
  <circle cx="36"  cy="20"  r="3" fill="#E3F2FD" fill-opacity="0.80"/>
  <circle cx="28"  cy="80"  r="4" fill="#FFD54F" fill-opacity="0.50"/>
  <circle cx="142" cy="50"  r="5" fill="#E8F5E9" fill-opacity="0.80"/>
  <circle cx="140" cy="120" r="3" fill="#E3F2FD" fill-opacity="0.70"/>
</svg>
