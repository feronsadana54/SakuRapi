<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wallet body -->
  <rect x="12" y="32" width="76" height="54" rx="10" fill="#1565C0"/>
  <!-- Wallet top flap -->
  <rect x="12" y="26" width="76" height="22" rx="9" fill="#003C8F"/>
  <!-- Subtle highlight stripe -->
  <rect x="12" y="42" width="76" height="4" fill="#FFFFFF" fill-opacity="0.09"/>
  <!-- Coin pocket shadow -->
  <circle cx="72" cy="65" r="15" fill="#000000" fill-opacity="0.16"/>
  <!-- Coin -->
  <circle cx="72" cy="65" r="12" fill="#FFB300"/>
  <!-- Coin highlight -->
  <circle cx="68" cy="61" r="4" fill="#FFD54F" fill-opacity="0.55"/>
  <!-- Rp on coin -->
  <text x="72" y="70" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" font-weight="bold" fill="#FFFFFF">Rp</text>
  <!-- Card lines -->
  <rect x="20" y="52" width="38" height="5" rx="2" fill="#FFFFFF" fill-opacity="0.38"/>
  <rect x="20" y="64" width="24" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.22"/>
</svg>
