<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Calendar body -->
  <rect x="12" y="32" width="136" height="120" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="12" y="32" width="136" height="38" rx="14" fill="#1565C0"/>
  <rect x="12" y="52" width="136" height="18" fill="#1565C0"/>
  <!-- Header text -->
  <text x="80" y="55" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" font-weight="bold" fill="#FFFFFF">APRIL 2026</text>
  <!-- Ring clips (hooks) -->
  <rect x="44" y="22" width="10" height="18" rx="4" fill="#003C8F"/>
  <rect x="106" y="22" width="10" height="18" rx="4" fill="#003C8F"/>
  <!-- Day column headers -->
  <text x="32"  y="82" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#9CA3AF">S</text>
  <text x="54"  y="82" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#9CA3AF">S</text>
  <text x="76"  y="82" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#9CA3AF">R</text>
  <text x="98"  y="82" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#9CA3AF">K</text>
  <text x="120" y="82" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#9CA3AF">J</text>
  <!-- Week 1 dots -->
  <circle cx="32"  cy="96" r="6" fill="#F3F4F6"/>
  <circle cx="54"  cy="96" r="6" fill="#F3F4F6"/>
  <circle cx="76"  cy="96" r="6" fill="#F3F4F6"/>
  <circle cx="98"  cy="96" r="6" fill="#F3F4F6"/>
  <circle cx="120" cy="96" r="6" fill="#F3F4F6"/>
  <!-- Week 2 dots -->
  <circle cx="32"  cy="114" r="6" fill="#F3F4F6"/>
  <circle cx="54"  cy="114" r="6" fill="#F3F4F6"/>
  <circle cx="76"  cy="114" r="6" fill="#F3F4F6"/>
  <circle cx="98"  cy="114" r="6" fill="#F3F4F6"/>
  <!-- Week 2 last: payday highlighted -->
  <circle cx="120" cy="114" r="10" fill="#2E7D32"/>
  <text x="120" y="118" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" font-weight="bold" fill="#FFFFFF">25</text>
  <!-- Week 3 partial -->
  <circle cx="32"  cy="132" r="6" fill="#F3F4F6"/>
  <circle cx="54"  cy="132" r="6" fill="#F3F4F6"/>
  <circle cx="76"  cy="132" r="6" fill="#F3F4F6"/>
  <!-- Green checkmark badge bottom-right -->
  <circle cx="128" cy="140" r="13" fill="#2E7D32"/>
  <polyline points="121,140 126,145 135,133"
            stroke="#FFFFFF" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Star accent -->
  <circle cx="14" cy="32" r="4" fill="#FFD54F" fill-opacity="0.70"/>
  <circle cx="148" cy="138" r="3" fill="#E3F2FD" fill-opacity="0.80"/>
</svg>
