<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Grid lines -->
  <line x1="20" y1="130" x2="148" y2="130" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="20" y1="104" x2="148" y2="104" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="20" y1="78"  x2="148" y2="78"  stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="20" y1="52"  x2="148" y2="52"  stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Y-axis -->
  <line x1="20" y1="20" x2="20" y2="130" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Bar 1 (expense, short) -->
  <rect x="30" y="100" width="18" height="30" rx="4" fill="#EF5350" fill-opacity="0.85"/>
  <!-- Bar 2 (expense, medium) -->
  <rect x="56" y="82"  width="18" height="48" rx="4" fill="#EF5350" fill-opacity="0.85"/>
  <!-- Bar 3 (income, tall) -->
  <rect x="82" y="60"  width="18" height="70" rx="4" fill="#2E7D32" fill-opacity="0.90"/>
  <!-- Bar 4 (income, tallest) -->
  <rect x="108" y="38" width="18" height="92" rx="4" fill="#2E7D32" fill-opacity="0.90"/>
  <!-- Trend line -->
  <polyline points="39,112 65,94 91,72 117,50"
            stroke="#1565C0" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dots -->
  <circle cx="39"  cy="112" r="4" fill="#1565C0"/>
  <circle cx="65"  cy="94"  r="4" fill="#1565C0"/>
  <circle cx="91"  cy="72"  r="4" fill="#1565C0"/>
  <circle cx="117" cy="50"  r="4" fill="#1565C0"/>
  <!-- Arrow head up -->
  <polygon points="117,34 121,44 113,44" fill="#1565C0"/>
  <!-- Legend coin -->
  <circle cx="142" cy="28" r="12" fill="#FFB300"/>
  <circle cx="139" cy="25" r="4" fill="#FFD54F" fill-opacity="0.55"/>
  <text x="142" y="33" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" font-weight="bold" fill="#FFFFFF">Rp</text>
</svg>
