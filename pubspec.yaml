name: finance_tracker
description: "Aplikasi pencatat keuangan pribadi yang modern dan lengkap."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.2

  # Persistence
  shared_preferences: ^2.3.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  path_provider: ^2.1.3
  path: ^1.9.0
  equatable: ^2.0.5
  csv: ^6.0.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  permission_handler: ^11.3.1

  # Web interop (needed for browser download/upload on Flutter Web)
  web: ^1.1.1

  # Firebase & Google Sign-In
  # Aktifkan setelah menjalankan: flutterfire configure
  # Lihat docs/DEVELOPMENT_TO_DEPLOY.md §3 untuk panduan lengkap.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # Deep link — dibutuhkan untuk menangkap URI email sign-in link di Android/iOS
  app_links: ^6.3.0

  # UI
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
